<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Clothing Materials</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Manage Clothing Materials</h1>

        <!-- Form to Add a New Material -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                Add New Material
            </div>
            <div class="card-body">
                <form action="/admin/clothing" method="POST" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" name="material" class="form-control" placeholder="Material Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="description" class="form-control" placeholder="Description" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" name="material_footprint" class="form-control" placeholder="Material Footprint (kg CO2)" step="0.01" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="biodegradability" class="form-control" placeholder="Biodegradability" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="recyclability" class="form-control" placeholder="Recyclability" required>
                    </div>
                    <div class="col-md-4">
                        <select name="eco_rating" class="form-select" required>
                            <option value="" disabled selected>Eco Rating</option>
                            <option value="Eco-Friendly">Eco-Friendly</option>
                            <option value="Moderate">Moderate</option>
                            <option value="High Impact">High Impact</option>
                        </select>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success">Add Material</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Existing Materials -->
        <h2 class="mb-3">Existing Materials</h2>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Material</th>
                    <th>Description</th>
                    <th>Footprint (kg CO2)</th>
                    <th>Biodegradability</th>
                    <th>Recyclability</th>
                    <th>Eco Rating</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for material in materials %}
                <tr>
                    <td>{{ material['id'] }}</td>
                    <td>
                        <form action="/admin/clothing/update/{{ material['id'] }}" method="POST" class="d-inline">
                            <input type="text" name="material" value="{{ material['material'] }}" class="form-control form-control-sm" required>
                    </td>
                    <td>
                            <input type="text" name="description" value="{{ material['description'] }}" class="form-control form-control-sm" required>
                    </td>
                    <td>
                            <input type="number" name="material_footprint" value="{{ material['material_footprint'] }}" step="0.01" class="form-control form-control-sm" required>
                    </td>
                    <td>
                            <input type="text" name="biodegradability" value="{{ material['biodegradability'] }}" class="form-control form-control-sm" required>
                    </td>
                    <td>
                            <input type="text" name="recyclability" value="{{ material['recyclability'] }}" class="form-control form-control-sm" required>
                    </td>
                    <td>
                            <select name="eco_rating" class="form-select form-select-sm" required>
                                <option value="Eco-Friendly" {% if material['eco_rating'] == 'Eco-Friendly' %}selected{% endif %}>Eco-Friendly</option>
                                <option value="Moderate" {% if material['eco_rating'] == 'Moderate' %}selected{% endif %}>Moderate</option>
                                <option value="High Impact" {% if material['eco_rating'] == 'High Impact' %}selected{% endif %}>High Impact</option>
                            </select>
                    </td>
                    <td>
                            <button type="submit" class="btn btn-primary btn-sm">Update</button>
                        </form>
                        <form action="/admin/clothing/delete/{{ material['id'] }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Include Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
